name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: |
          set +e
          pytest
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No tests collected yet - that's expected until contributors add files."
            exit 0
          fi
          exit "$status"
